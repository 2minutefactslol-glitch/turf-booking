<!DOCTYPE html>
<html>
<head>
    <title>TurfPro | Admin Login</title>
    <style>
        body{ font-family: 'Segoe UI', sans-serif; background:#1e3c72; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        .card{ background:white; padding:30px; border-radius:15px; width:90%; max-width:350px; text-align:center; }
        input{ width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
        .btn{ width:100%; padding:12px; background:#1e3c72; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Admin Portal</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button class="btn" onclick="login()">Login</button>
    </div>

    <script>
        async function login() {
            const body = { username: user.value, password: pass.value };
            // Replace 'localhost' with your IP if testing on other devices
            const res = await fetch("http://localhost:5000/admin-login", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify(body)
            });

            if(res.ok) {
                localStorage.setItem("adminLoggedIn", "true"); // THIS IS THE KEY
                window.location.href = "admin.html";
            } else {
                alert("Invalid Admin Credentials!");
            }
        }
    </script>
</body>
</html>

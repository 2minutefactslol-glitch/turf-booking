<!DOCTYPE html>
<html>
<head>
    <title>TurfPro | Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #1e3c72; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #1e3c72; outline: none; }
        button { width: 100%; padding: 12px; background: #1e3c72; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #2a5298; transform: translateY(-2px); }
        .demo-otp { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Welcome to TurfPro</h2>
    <input id="phone" type="tel" placeholder="Mobile Number">
    <button onclick="sendOTP()">Send OTP</button>
    <div id="otpSection" style="display:none; margin-top: 20px;">
        <input id="otp" type="number" placeholder="Enter 6-digit OTP">
        <button onclick="verifyOTP()" style="background: #22c55e;">Verify & Login</button>
    </div>
    <p class="demo-otp">Testing? Use OTP: 123456</p>
</div>
<script>
    let phoneNum = "";
    async function sendOTP() {
        phoneNum = document.getElementById("phone").value;
        if(phoneNum.length < 10) return alert("Valid phone required");
        await fetch("http://localhost:5000/send-otp", { method: "POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({phone: phoneNum}) });
        document.getElementById("otpSection").style.display = "block";
        alert("OTP Sent!");
    }
    async function verifyOTP() {
        const otp = document.getElementById("otp").value;
        const res = await fetch("http://localhost:5000/verify-otp", { method: "POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({otp}) });
        if(res.ok) {
            localStorage.setItem("loggedIn", "true");
            localStorage.setItem("userPhone", phoneNum);
            window.location = "index.html";
        } else alert("Invalid OTP");
    }
</script>
</body>
</html>

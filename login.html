<!DOCTYPE html>
<html>
<head>
    <title>TurfPro | Admin Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #1e3c72; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1e3c72; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Admin Login</h2>
    <input id="user" type="text" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>
<script>
    const BASE_URL = "https://turf-booking-natl.onrender.com";

    async function login() {
        const username = document.getElementById("user").value;
        const password = document.getElementById("pass").value;

        const res = await fetch(`${BASE_URL}/admin-login`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ username, password })
        });

        if(res.ok) {
            // This key MUST match the one in admin.html
            localStorage.setItem("adminLoggedIn", "true");
            window.location.href = "admin.html";
        } else {
            alert("Wrong credentials! Access Denied.");
        }
    }
</script>
</body>
</html>

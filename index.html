<!DOCTYPE html>

<html>

<head>

    <title>TurfPro | Book Now</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{ font-family: 'Segoe UI', sans-serif; background:#f1f5f9; margin:0; padding:15px; }

        .card{ background:white; padding:25px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin:auto; max-width:500px; }

        h2{ color:#1e3c72; text-align:center; margin-bottom:20px; }

        input{ width:100%; padding:12px; margin:10px 0; border:1px solid #cbd5e1; border-radius:8px; box-sizing:border-box; font-size:1rem; }

        

        /* THE GRID SECTION - RESTORED */

        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap:10px; margin:20px 0; min-height: 100px; }

        .slot{ padding:15px 5px; background:#22c55e; color:white; border-radius:10px; text-align:center; font-weight:bold; cursor:pointer; transition: 0.2s; border: 2px solid transparent; }

        

        .booked{ background:#fee2e2 !important; color:#ef4444 !important; cursor:not-allowed; }

        .past{ background:#e2e8f0 !important; color:#94a3b8 !important; cursor:not-allowed; pointer-events:none; }

        .selected{ background:#1e3c72 !important; border:2px solid #000; transform: scale(1.05); }

        .preview{ background:#f59e0b !important; }

        

        .btn{ width:100%; padding:15px; background:#22c55e; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:1.1rem; }

        .btn:disabled{ background:#cbd5e1 !important; color:#94a3b8; }

        #statusBanner { display:none; background:#fee2e2; color:#ef4444; padding:10px; border-radius:8px; text-align:center; font-weight:bold; margin-bottom:15px; border: 1px solid #fecaca; }

    </style>

</head>

<body>



<div class="card">

    <div id="statusBanner">⚠️ ONLINE BOOKINGS PAUSED</div>

    <h2>🏟️ TurfPro Booking</h2>

    

    <input id="userName" placeholder="Full Name">

    <input id="userPhone" type="tel" maxlength="10" placeholder="10-digit Phone">

    

    <div id="otpBox" style="display:none; border:1px dashed #1e3c72; padding:10px; border-radius:10px; margin-bottom:10px;">

        <input id="otpIn" type="tel" placeholder="Enter OTP (123456)">

        <button class="btn" style="background:#1e3c72" onclick="verifyOTP()">Verify OTP</button>

    </div>

    <button id="vBtn" class="btn" style="background:#1e3c72" onclick="sendOTP()">Verify Phone to Book</button>



    <label style="font-size:0.8rem; color:#64748b; font-weight:bold;">Select Date</label>

    <input id="date" type="date" onchange="loadSlots()">

    

    <label style="font-size:0.8rem; color:#64748b; font-weight:bold;">Duration (Hours)</label>

    <input id="dur" type="number" value="1" min="1" max="6" oninput="highlight(); calcPrice();">



    <h1 id="price" style="text-align:center; color:#1e3c72; margin:15px 0;">₹0</h1>

    

    <div id="slots" class="grid"></div>

    

    <button id="bookBtn" class="btn" onclick="bookNow()" disabled>Confirm Booking</button>

</div>



<script>

    const BASE_URL = "https://turf-booking-natl.onrender.com";

    let selectedSlot = null; let isVerified = false; let systemPaused = false;



    // Timezone & Date Lock (IST)

    const now = new Date();

    const localToday = now.toLocaleDateString('en-CA');

    const dt = document.getElementById("date");

    dt.setAttribute('min', localToday);

    const max = new Date(); max.setDate(now.getDate() + 7);

    dt.setAttribute('max', max.toLocaleDateString('en-CA'));

    dt.value = localToday;



    function fmt(h) { return (h % 12 || 12) + (h >= 12 ? " PM" : " AM"); }



    async function sendOTP() { alert("Demo OTP: 123456"); otpBox.style.display="block"; vBtn.style.display="none"; }

    async function verifyOTP() {

        const res = await fetch(`${BASE_URL}/verify-otp`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({otp: otpIn.value}) });

        if(res.ok) { isVerified = true; otpBox.style.display="none"; alert("Verified!"); checkStatus(); }

    }



    async function loadSlots() {

        try {

            const res = await fetch(`${BASE_URL}/bookings`);

            const data = await res.json();

            const grid = document.getElementById("slots"); 

            grid.innerHTML = "";

            

            const curH = new Date().getHours();

            const isToday = dt.value === localToday;



            for(let h=0; h<24; h++) {

                const s = document.createElement("div"); 

                s.className = "slot"; 

                s.innerText = fmt(h);

                

                const isPast = isToday && h <= curH;

                const isBooked = data.find(b => b.date === dt.value && h >= b.startHour && h < b.startHour + b.duration);

                

                if(isPast) s.classList.add("past");

                else if(isBooked) s.classList.add("booked");

                else {

                    if(selectedSlot === h) s.classList.add("selected");

                    s.onclick = () => { if(!systemPaused) { selectedSlot = h; highlight(); calcPrice(); } };

                }

                grid.appendChild(s);

            }

            highlight(); // Ensure highlights remain after grid refresh

        } catch(e) { console.error("Grid load failed"); }

    }



    function highlight() {

        const slots = document.querySelectorAll(".slot");

        const dr = parseInt(dur.value) || 1;

        slots.forEach(s => s.classList.remove("selected", "preview"))

<!DOCTYPE html>
<html>
<head>
    <title>TurfPro | IST Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{ font-family: sans-serif; background:#f1f5f9; margin:0; padding:10px; }
        .card{ background:white; padding:20px; border-radius:15px; box-shadow:0 4px 6px rgba(0,0,0,0.1); margin:auto; max-width:800px; }
        input{ width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap:10px; }
        .slot{ padding:15px 5px; background:#22c55e; color:white; border-radius:10px; text-align:center; font-weight:bold; cursor:pointer; }
        .booked{ background:#fee2e2; color:#ef4444; cursor:not-allowed; }
        .past{ background:#e2e8f0 !important; color:#94a3b8 !important; cursor:not-allowed; pointer-events:none; }
        .selected{ background:#1e3c72 !important; border:2px solid #000; }
        .btn{ width:100%; padding:15px; background:#22c55e; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
        .btn:disabled{ background:#cbd5e1 !important; color:#94a3b8; }
    </style>
</head>
<body>
<div class="card">
    <h2 style="color:#1e3c72; text-align:center;">🏟️ TurfPro</h2>
    <input id="userName" placeholder="Full Name">
    <input id="userPhone" type="tel" maxlength="10" placeholder="Phone">
    <div id="otpBox" style="display:none; border:1px dashed #1e3c72; padding:10px; border-radius:10px; margin-bottom:10px;">
        <input id="otpIn" type="tel" placeholder="OTP (123456)">
        <button class="btn" style="background:#1e3c72" onclick="verifyOTP()">Verify</button>
    </div>
    <button id="vBtn" class="btn" style="background:#1e3c72" onclick="sendOTP()">Verify Phone</button>
    <input id="date" type="date" onchange="loadSlots()">
    <input id="dur" type="number" value="1" min="1" max="6" onchange="highlight(); calcPrice();">
    <h1 id="price" style="text-align:center; color:#1e3c72;">₹0</h1>
    <div id="slots" class="grid"></div>
    <button id="bookBtn" class="btn" onclick="bookNow()" disabled>Book Now</button>
</div>

<script>
    const BASE_URL = "https://turf-booking-natl.onrender.com";
    let selectedSlot = null; let isVerified = false; let systemPaused = false;

    // --- LOCAL TIMEZONE FIX ---
    const now = new Date();
    const localToday = now.toLocaleDateString('en-CA'); // YYYY-MM-DD local format
    const dt = document.getElementById("date");
    dt.setAttribute('min', localToday);
    const max = new Date(); max.setDate(now.getDate() + 7);
    dt.setAttribute('max', max.toLocaleDateString('en-CA'));
    dt.value = localToday;

    function fmt(h) { return (h % 12 || 12) + (h >= 12 ? " PM" : " AM"); }

    async function sendOTP() { alert("Demo OTP: 123456"); otpBox.style.display="block"; vBtn.style.display="none"; }
    async function verifyOTP() {
        const res = await fetch(`${BASE_URL}/verify-otp`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({otp: otpIn.value}) });
        if(res.ok) { isVerified = true; otpBox.style.display="none"; alert("Verified!"); checkStatus(); }
    }

    async function loadSlots() {
        const res = await fetch(`${BASE_URL}/bookings`);
        const data = await res.json();
        const grid = document.getElementById("slots"); grid.innerHTML = "";
        const curH = new Date().getHours();
        const isToday = dt.value === localToday;

        for(let h=0; h<24; h++) {
            const s = document.createElement("div"); s.className = "slot"; s.innerText = fmt(h);
            const isPast = isToday && h <= curH;
            const isBooked = data.find(b => b.date === dt.value && h >= b.startHour && h < b.startHour + b.duration);
            if(isPast) s.classList.add("past");
            else if(isBooked) s.classList.add("booked");
            else {
                if(selectedSlot === h) s.classList.add("selected");
                s.onclick = () => { if(!systemPaused) { selectedSlot = h; highlight(); calcPrice(); } };
            }
            grid.appendChild(s);
        }
    }

    function highlight() {
        const slots = document.querySelectorAll(".slot");
        slots.forEach(s => s.classList.remove("selected", "preview"));
        if(selectedSlot === null) return;
        for(let i=0; i<parseInt(dur.value); i++){
            let h = selectedSlot + i;
            if(slots[h] && !slots[h].classList.contains("booked") && !slots[h].classList.contains("past")) slots[h].classList.add(i===0?"selected":"preview");
        }
    }

    async function calcPrice() {
        const p = await (await fetch(`${BASE_URL}/current-price`)).json();
        let total = 0;
        for(let i=0; i<parseInt(dur.value); i++) {
            let h = (selectedSlot + i) % 24;
            total += (h >= 5 && h < 18) ? p.dayPrice : p.nightPrice;
        }
        document.getElementById("price").innerText = "₹" + total;
    }

    async function checkStatus() {
        const s = await (await fetch(`${BASE_URL}/booking-status`)).json();
        systemPaused = s.paused;
        bookBtn.disabled = s.paused || !isVerified;
        bookBtn.innerText = s.paused ? "Paused by Admin" : (isVerified ? "Book Now" : "Verify Phone to Book");
    }

    async function bookNow() {
        const body = { name: userName.value, phone: userPhone.value, date: dt.value, startHour: selectedSlot, duration: parseInt(dur.value), sport: "Online" };
        const res = await fetch(`${BASE_URL}/book`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
        if(res.ok) { alert("Success!"); location.reload(); } else alert((await res.json()).message);
    }

    setInterval(() => { checkStatus(); loadSlots(); }, 4000);
    loadSlots();
</script>
</body>
</html>

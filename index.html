<!DOCTYPE html>
<html>
<head>
    <title>TurfPro | Mobile Optimized</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <style>
        body{ font-family: sans-serif; background:#f1f5f9; padding:10px; }
        .card{ background:white; padding:20px; border-radius:15px; margin-bottom:20px; }
        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap:8px; }
        .slot{ padding:12px; background:#22c55e; color:white; border-radius:8px; text-align:center; font-weight:bold; }
        .booked{ background:#fee2e2; color:#ef4444; }
        .past{ background:#e2e8f0; color:#94a3b8; cursor:not-allowed; } /* FIXED LOGIC */
        .selected{ background:#1e3c72 !important; border:2px solid black; }
        .preview{ background:orange !important; } /* ORANGE PREVIEW FIX */
        input{ width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
        .btn{ width:100%; padding:15px; background:#1e3c72; color:white; border:none; border-radius:10px; font-weight:bold; }
    </style>
</head>
<body>

<div class="card">
    <h3>Book Turf</h3>
    <input id="name" placeholder="Name">
    <input id="phone" type="tel" placeholder="Phone">
    <input id="otp" type="tel" inputmode="numeric" placeholder="OTP (123456)" style="display:none">
    <button id="vBtn" class="btn" onclick="sendOTP()">Verify Phone</button>
    <button id="cBtn" class="btn" onclick="confirmOTP()" style="display:none; background:#22c55e;">Confirm OTP</button>
    
    <label>Date</label>
    <input id="date" type="date" onchange="loadSlots()">
    <label>Duration (Hrs)</label>
    <input id="dur" type="number" value="1" min="1" onchange="highlight()">
    <h2 id="price">₹0</h2>
    <button id="bookBtn" class="btn" onclick="book()" disabled>Book Now</button>
</div>

<div class="card"><div id="slots" class="grid"></div></div>

<script>
    const BASE_URL = "https://turf-booking-natl.onrender.com";
    let selectedSlot = null;
    let isVerified = false;

    // FIX: Lock dates before today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("date").setAttribute('min', today);
    document.getElementById("date").value = today;

    async function sendOTP() {
        alert("OTP Sent: 123456");
        document.getElementById("otp").style.display = "block";
        document.getElementById("cBtn").style.display = "block";
        document.getElementById("vBtn").style.display = "none";
    }

    async function confirmOTP() {
        const res = await fetch(`${BASE_URL}/verify-otp`, {
            method: "POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ otp: document.getElementById("otp").value })
        });
        if(res.ok) {
            isVerified = true;
            document.getElementById("bookBtn").disabled = false;
            document.getElementById("otp").style.display = "none";
            document.getElementById("cBtn").style.display = "none";
            alert("Verified!");
        } else alert("Invalid OTP");
    }

    async function loadSlots() {
        const dateStr = document.getElementById("date").value;
        const res = await fetch(`${BASE_URL}/bookings`);
        const data = await res.json();
        const grid = document.getElementById("slots");
        grid.innerHTML = "";
        
        const now = new Date();
        const isToday = dateStr === now.toISOString().split("T")[0];
        const curH = now.getHours();

        for(let h=0; h<24; h++) {
            const s = document.createElement("div");
            s.className = "slot";
            s.innerText = (h%12||12) + (h>=12?"PM":"AM");
            
            // FIX: Disable past slots
            const isPast = isToday && h <= curH;
            const isBooked = data.find(b => b.date === dateStr && h >= b.startHour && h < b.startHour + b.duration);

            if(isPast) s.classList.add("past");
            else if(isBooked) s.classList.add("booked");
            
            if(selectedSlot === h) s.classList.add("selected");
            
            s.onclick = () => { if(!isPast && !isBooked) { selectedSlot = h; highlight(); } };
            grid.appendChild(s);
        }
    }

    function highlight() {
        const slots = document.querySelectorAll(".slot");
        const dur = parseInt(document.getElementById("dur").value);
        slots.forEach(s => s.classList.remove("selected", "preview"));
        if(selectedSlot === null) return;
        
        for(let i=0; i<dur; i++) {
            let h = selectedSlot + i;
            if(slots[h] && !slots[h].classList.contains("booked") && !slots[h].classList.contains("past")) {
                slots[h].classList.add(i === 0 ? "selected" : "preview");
            }
        }
    }

    async function book() {
        const body = { name: name.value, phone: phone.value, date: date.value, startHour: selectedSlot, duration: dur.value };
        const res = await fetch(`${BASE_URL}/book`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
        if(res.ok) { alert("Booked!"); location.reload(); }
    }

    loadSlots();
</script>
</body>
</html>

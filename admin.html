<!DOCTYPE html>
<html>
<head>
    <title>TurfPro Admin | Live Control</title>
    <style>
        body{ font-family: 'Segoe UI', sans-serif; background:#f4f6f9; margin:0; }
        header{ background:#1e3c72; color:white; padding:20px; text-align:center; }
        .container{ max-width:1100px; margin:auto; padding:30px; }
        .card{ background:white; padding:25px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin-bottom:25px; }
        input{ width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px; box-sizing: border-box;}
        button{ padding:12px 20px; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; transition: 0.2s; }
        .btn-pause{ background:#ef4444; } 
        .btn-resume{ background:#22c55e; }
        .btn-cancel { background:#ef4444; padding: 5px 10px; font-size: 12px; }
        
        .grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-top:15px; }
        .slot{ padding:15px; text-align:center; border-radius:8px; border:2px solid #e2e8f0; font-weight:bold; cursor:pointer; background:#22c55e; color:white; }
        .booked{ background:#ef4444; border-color:#ef4444; cursor:not-allowed; }
        .selected{ border:3px solid black !important; background: #1e3c72 !important; transform:scale(1.02); }
        .preview{ background:orange !important; border-color:orange !important; }
        
        table{ width:100%; border-collapse:collapse; margin-top:20px; }
        th,td{ border-bottom:1px solid #eee; padding:12px; text-align:center; }
        #statusTxt { padding: 4px 8px; border-radius: 4px; color: white; }
        .status-active { background: #22c55e; }
        .status-paused { background: #ef4444; }
    </style>
</head>
<body>

<header><h1>Admin Control Center</h1></header>

<div class="container">
    <div class="card">
        <h3>System Status: <span id="statusTxt">---</span></h3>
        <button class="btn-pause" onclick="toggleSys(true)">Pause Customer Bookings</button>
        <button class="btn-resume" onclick="toggleSys(false)" style="margin-left: 10px;">Resume System</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
            <h3>Today's Revenue</h3>
            <h1 id="rev" style="color: #1e3c72; margin: 0;">₹0</h1>
        </div>
        <div class="card">
            <h3>Current Date</h3>
            <h2 id="displayDate" style="margin: 0; color: #666;">-</h2>
        </div>
    </div>

    <div class="card">
        <h3>Manual / Offline Booking</h3>
        <div style="display: flex; gap: 15px;">
            <input id="offName" placeholder="Customer Name">
            <input id="offDate" type="date" onchange="loadView()">
            <input id="offDur" type="number" value="1" min="1" onchange="highlight()">
        </div>
        <div id="slots" class="grid"></div>
        <br>
        <button class="btn-resume" onclick="addOffline()" style="width: 100%;">Confirm Manual Booking</button>
    </div>

    <div class="card">
        <h3>All Active Bookings</h3>
        <table id="btable">
            <thead>
                <tr>
                    <th>Customer Name</th>
                    <th>Date</th>
                    <th>Start Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // ⬇️ THE CORE CONNECTION URL ⬇️
    const BASE_URL = "https://turf-booking-natl.onrender.com";

    let selectedSlot = null;
    const errSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    const successSound = new Audio("https://actions.google.com/sounds/v1/notifications/positive_notification.ogg");

    function fmt(h) { return (h % 12 || 12) + (h >= 12 ? " PM" : " AM"); }

    async function loadView() {
        const date = document.getElementById("offDate").value;
        document.getElementById("displayDate").innerText = date;
        
        try {
            const res = await fetch(`${BASE_URL}/bookings`);
            const data = await res.json();
            const grid = document.getElementById("slots");
            grid.innerHTML = "";
            
            for(let h=0; h<24; h++){
                const s = document.createElement("div");
                s.className = "slot";
                if(data.find(b => b.date === date && h >= b.startHour && h < b.startHour + b.duration)) s.classList.add("booked");
                
                if(selectedSlot === h) s.classList.add("selected");
                
                s.innerText = fmt(h);
                s.onclick = () => { 
                    if(!s.classList.contains("booked")) { 
                        selectedSlot = h; 
                        highlight(); 
                    } 
                };
                grid.appendChild(s);
            }
            highlight();
        } catch (e) { console.error("Grid Load Error", e); }
    }

    function highlight() {
        const slots = document.querySelectorAll(".slot");
        const dur = parseInt(document.getElementById("offDur").value);
        slots.forEach(s => s.classList.remove("preview", "selected"));
        if(selectedSlot === null) return;
        
        for(let i=0; i<dur; i++){
            let h = selectedSlot + i;
            if(slots[h] && !slots[h].classList.contains("booked")) {
                slots[h].classList.add(i === 0 ? "selected" : "preview");
            }
        }
    }

    async function addOffline() {
        if(selectedSlot === null) return alert("Select a slot first!");
        const body = {
            name: document.getElementById("offName").value || "Walk-in Customer", 
            date: document.getElementById("offDate").value,
            startHour: selectedSlot, 
            duration: parseInt(document.getElementById("offDur").value), 
            sport: "Offline",
            phone: "0000000000" // Placeholder for admin bookings
        };
        
        const res = await fetch(`${BASE_URL}/book`, { 
            method:"POST", 
            headers:{"Content-Type":"application/json"}, 
            body:JSON.stringify(body) 
        });
        
        if(!res.ok) { 
            errSound.play(); 
            const data = await res.json();
            alert(data.message); 
        } else { 
            successSound.play(); 
            selectedSlot = null; 
            document.getElementById("offName").value = "";
            sync(); 
        }
    }

    async function toggleSys(status) {
        await fetch(`${BASE_URL}/toggle-booking`, { 
            method:"POST", 
            headers:{"Content-Type":"application/json"}, 
            body:JSON.stringify({status}) 
        });
        sync();
    }

    async function sync() {
        try {
            // Check System Status
            const sRes = await fetch(`${BASE_URL}/booking-status`);
            const s = await sRes.json();
            const statusEl = document.getElementById("statusTxt");
            statusEl.innerText = s.paused ? "PAUSED" : "ACTIVE";
            statusEl.className = s.paused ? "status-paused" : "status-active";
            
            // Get Revenue
            const dRes = await fetch(`${BASE_URL}/dashboard`);
            const d = await dRes.json();
            document.getElementById("rev").innerText = "₹" + d.revenue;

            // Get All Bookings
            const bRes = await fetch(`${BASE_URL}/bookings`);
            const b = await bRes.json();
            const tbody = document.querySelector("#btable tbody");
            tbody.innerHTML = "";
            b.forEach(book => {
                tbody.innerHTML += `<tr>
                    <td>${book.name}</td>
                    <td>${book.date}</td>
                    <td>${fmt(book.startHour)} (${book.duration}h)</td>
                    <td><button class="btn-cancel" onclick="del('${book._id}')">Cancel</button></td>
                </tr>`;
            });
            loadView();
        } catch (e) { console.error("Sync Error", e); }
    }

    async function del(id) { 
        if(!confirm("Are you sure you want to delete this booking?")) return;
        await fetch(`${BASE_URL}/booking/${id}`, {method:"DELETE"}); 
        sync(); 
    }

    // Set Default Date
    document.getElementById("offDate").valueAsDate = new Date();
    
    // Start Loops
    setInterval(sync, 4000);
    sync();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>TurfPro Admin | Pro Control</title>
    <script>if(localStorage.getItem("adminLoggedIn")!=="true") location.href="login.html";</script>
    <style>
        body{ font-family: 'Segoe UI', sans-serif; background:#f4f6f9; margin:0; color: #1e293b; }
        header{ background:#1e3c72; color:white; padding:15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container{ max-width:1100px; margin:auto; padding:20px; }
        .card{ background:white; padding:25px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05); margin-bottom:25px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-left: 5px solid #1e3c72; }
        
        input, select { width:100%; padding:10px; margin-bottom:10px; border:1px solid #cbd5e1; border-radius:8px; box-sizing: border-box; }
        button { padding:10px 20px; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
        
        .btn-pause { background:#ef4444; } .btn-resume { background:#22c55e; }
        .btn-blue { background: #0ea5e9; width: 100%; }
        
        /* Grid for Offline Booking */
        .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap:8px; margin-top:10px; }
        .slot{ padding:10px 5px; background:#22c55e; color:white; border-radius:8px; text-align:center; font-size:0.8rem; cursor:pointer; }
        .booked{ background:#fee2e2; color:#ef4444; cursor:not-allowed; }
        .selected{ background:#1e3c72 !important; border:2px solid black; }
        
        table { width:100%; border-collapse:collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: left; }
    </style>
</head>
<body>

<header>
    <h1>TurfPro Admin</h1>
    <button onclick="localStorage.clear(); location.href='login.html';" style="background:rgba(255,255,255,0.2); border:1px solid white;">Logout</button>
</header>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <small>Today's Revenue</small>
            <h2 id="revDisplay">₹0</h2>
            <button class="btn-blue" onclick="downloadReport()">Download CSV Report</button>
        </div>
        <div class="stat-card">
            <small>System Status: <span id="statusTxt">---</span></small>
            <div style="margin-top:15px">
                <button class="btn-pause" onclick="toggleSys(true)">Pause Online</button>
                <button class="btn-resume" onclick="toggleSys(false)">Resume Online</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Custom Pricing</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="newDay" type="number" placeholder="Day Price">
            <input id="newNight" type="number" placeholder="Night Price">
        </div>
        <button class="btn-blue" onclick="updatePrice()">Save Prices</button>
    </div>

    <div class="card">
        <h3>Manual / Offline Booking</h3>
        <input id="offName" placeholder="Customer Name">
        <input id="offDate" type="date" onchange="loadOfflineGrid()">
        <input id="offDur" type="number" value="1" min="1" placeholder="Duration">
        <div id="offlineGrid" class="grid"></div>
        <button class="btn-resume" onclick="addOffline()" style="width:100%; margin-top:15px;">Confirm Offline Booking</button>
    </div>

    <div class="card">
        <h3>All Bookings</h3>
        <input id="searchBar" onkeyup="filterTable()" placeholder="Search by name or phone...">
        <table id="bTable">
            <thead>
                <tr><th>Customer</th><th>Phone</th><th>Date</th><th>Time</th><th>Action</th></tr>
            </thead>
            <tbody id="bookingTable"></tbody>
        </table>
    </div>
</div>

<script>
    const BASE_URL = "https://turf-booking-natl.onrender.com";
    let currentBookings = [];
    let selectedSlot = null;

    function fmt(h) { return (h % 12 || 12) + (h >= 12 ? " PM" : " AM"); }
    document.getElementById("offDate").valueAsDate = new Date();

    async function sync() {
        try {
            const bRes = await fetch(`${BASE_URL}/bookings`);
            currentBookings = await bRes.json();
            
            const sRes = await fetch(`${BASE_URL}/booking-status`);
            const sData = await sRes.json();
            document.getElementById("statusTxt").innerText = sData.paused ? "PAUSED" : "ACTIVE";

            const dRes = await fetch(`${BASE_URL}/dashboard`);
            const dData = await dRes.json();
            document.getElementById("revDisplay").innerText = "₹" + dData.revenue;

            renderTable(currentBookings);
            loadOfflineGrid();
        } catch(e) { console.log("Sync error"); }
    }

    function renderTable(data) {
        const tbody = document.getElementById("bookingTable");
        let html = "";
        data.forEach(b => {
            html += `<tr id="row-${b._id}">
                <td><strong>${b.name || 'Walk-in'}</strong></td>
                <td>${b.phone || 'N/A'}</td>
                <td>${b.date}</td>
                <td>${fmt(b.startHour)} (${b.duration}h)</td>
                <td><button style="background:#ef4444;" onclick="del('${b._id}')">Cancel</button></td>
            </tr>`;
        });
        tbody.innerHTML = html || "<tr><td colspan='5'>No bookings</td></tr>";
    }

    function filterTable() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        const filtered = currentBookings.filter(b => 
            (b.name && b.name.toLowerCase().includes(query)) || 
            (b.phone && b.phone.includes(query))
        );
        renderTable(filtered);
    }

    async function loadOfflineGrid() {
        const date = document.getElementById("offDate").value;
        const grid = document.getElementById("offlineGrid");
        grid.innerHTML = "";
        for(let h=0; h<24; h++){
            const s = document.createElement("div");
            s.className = "slot";
            s.innerText = fmt(h);
            if(currentBookings.find(b => b.date === date && h >= b.startHour && h < b.startHour + b.duration)) s.classList.add("booked");
            if(selectedSlot === h) s.classList.add("selected");
            s.onclick = () => { if(!s.classList.contains("booked")) { selectedSlot = h; loadOfflineGrid(); } };
            grid.appendChild(s);
        }
    }

    async function addOffline() {
        const body = { name: offName.value || "Offline User", date: offDate.value, startHour: selectedSlot, duration: parseInt(offDur.value), sport: "Offline" };
        const res = await fetch(`${BASE_URL}/book`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
        if(res.ok) { selectedSlot = null; sync(); }
    }

    async function updatePrice() {
        await fetch(`${BASE_URL}/set-price`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ dayPrice: newDay.value, nightPrice: newNight.value }) });
        alert("Prices Saved");
    }

    async function del(id) {
        if(!confirm("Cancel?")) return;
        document.getElementById(`row-${id}`).style.opacity = "0.3";
        await fetch(`${BASE_URL}/booking/${id}`, { method: "DELETE" });
        sync();
    }

    async function toggleSys(status) {
        await fetch(`${BASE_URL}/toggle-booking`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ status }) });
        sync();
    }

    function downloadReport() {
        let csv = "Name,Phone,Date,Time,Duration,Type\n";
        currentBookings.forEach(b => csv += `${b.name},${b.phone},${b.date},${fmt(b.startHour)},${b.duration},${b.sport}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Report_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    setInterval(sync, 2000);
    sync();
</script>
</body>
</html>
